<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%236C5CE7' d='M12 2L1 21h22L12 2zm0 3.99L19.53 19H4.47L12 5.99zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z'/></svg>" type="image/svg+xml">
</head>
<body>
    <div class="container">
        <!-- Left Panel -->
        <div class="game-section">
            <div class="title-container">
                <h1>Tower of Hanoi</h1>
                <p class="subtitle">A Recursive Challenge</p>
            </div>
            
            <!-- Game Board -->
            <div class="game-container">
                <div class="tower" id="towerA">
                    <div class="pole"></div>
                    <div class="base"></div>
                    <div class="disks"></div>
                    <div class="label">Tower A</div>
                </div>
                <div class="tower" id="towerB">
                    <div class="pole"></div>
                    <div class="base"></div>
                    <div class="disks"></div>
                    <div class="label">Tower B</div>
                </div>
                <div class="tower" id="towerC">
                    <div class="pole"></div>
                    <div class="base"></div>
                    <div class="disks"></div>
                    <div class="label">Tower C</div>
                </div>
            </div>

            <!-- Game Controls -->
            <div class="controls">
                <button id="resetBtn" class="control-btn">Reset Game</button>
                <div style="display: flex; align-items: center; gap: var(--spacing-md);">
                    <button id="autoSolveBtn" class="control-btn">Auto Solve</button>
                    <div class="speed-control">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="1" max="10" value="5">
                        <span id="speedValue">5</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="stats-container">
                <div class="stats">
                    <div class="timer">Time: <span id="timer">00:00.00
                        
                    </span></div>
                    <div class="moves">Moves: <span id="moves">0</span></div>
                </div>
            </div>
            <div class="history-container">
                <h3>Move History</h3>
                <div class="history" id="moveHistory"></div>

                <!-- Theme Toggle -->
                <div class="mode-switch">
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                    <span>Dark Mode</span>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // Theme detection and initialization
        const themeToggle = document.getElementById('theme-toggle');
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

        function updateTheme(isDark) {
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            themeToggle.checked = isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                updateTheme(savedTheme === 'dark');
            } else {
                updateTheme(prefersDarkScheme.matches);
            }
        }

        prefersDarkScheme.addListener((e) => {
            if (!localStorage.getItem('theme')) {
                updateTheme(e.matches);
            }
        });

        themeToggle.addEventListener('change', () => {
            updateTheme(themeToggle.checked);
        });

        document.addEventListener('DOMContentLoaded', initializeTheme);
        initializeTheme();
    </script>
</body>
</html>
