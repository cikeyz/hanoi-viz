<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tower of Hanoi</h1>
        
        <div class="stats">
            <div class="timer">Time: <span id="timer">0:00</span></div>
            <div class="moves">Moves: <span id="moves">0</span></div>
        </div>

        <div class="game-container">
            <div class="tower" id="towerA">
                <div class="pole"></div>
                <div class="base"></div>
                <div class="disks"></div>
                <div class="label">Tower A</div>
            </div>
            <div class="tower" id="towerB">
                <div class="pole"></div>
                <div class="base"></div>
                <div class="disks"></div>
                <div class="label">Tower B</div>
            </div>
            <div class="tower" id="towerC">
                <div class="pole"></div>
                <div class="base"></div>
                <div class="disks"></div>
                <div class="label">Tower C</div>
            </div>
        </div>

        <div class="controls">
            <button id="resetBtn">Reset Game</button>
        </div>

        <div class="history-container">
            <h3>Move History</h3>
            <div class="history" id="moveHistory"></div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
